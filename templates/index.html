<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>AI 뉴스 요약 대시보드</title>
    <style>
        body { font-family: sans-serif; line-height: 1.6; max-width: 800px; margin: 0 auto; padding: 20px; }
        .news-item { border-bottom: 1px solid #eee; padding: 15px 0; }
        .news-title { font-size: 1.2em; color: #1a0dab; text-decoration: none; }
        .news-date { font-size: 0.85em; color: #70757a; }
        .news-summary { color: #4d5156; margin-top: 8px; font-size: 0.95em; }
    </style>
</head>
<body>
    <h1>🗞️ 지난 24시간 주요 뉴스</h1>
    {% for item in news %}
    <div class="news-item">
        <a href="{{ item.link }}" class="news-title" target="_blank">{{ item.title }}</a>
        <div class="news-date">발행: {{ item.date }}</div>
        <div class="news-summary">{{ item.summary }}</div>
    </div>
    {% endfor %}
</body>
</html>
